services:
  - type: web
    name: bothouse
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: Dockerfile.chromium
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: LOG_LEVEL
        value: warn
