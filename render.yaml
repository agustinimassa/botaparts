services:
  - type: web
    name: bothouse
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    # 🚀 OPTIMIZADO PARA RENDER FREE TIER (512MB RAM)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: LOG_LEVEL
        value: info
      # ⚠️ CRÍTICO: Habilitar monitor de memoria en producción
      - key: ENABLE_MEMORY_MONITOR
        value: "true"
      # ⚠️ IMPORTANTE: NO activar single-process (causa crashes)
      - key: CHROMIUM_SINGLE_PROCESS
        value: "false"
      # Recomendado: proteger POST /api/scrape/run
      # - key: ADMIN_TOKEN
      #   sync: false
      #
      # AI (opcional)
      # - key: GROQ_API_KEY
      #   sync: false
      # - key: AI_MODEL
      #   value: llama-3.1-8b-instant
      #
      # SMTP (si vas a enviar emails)
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      #
      # Google Sheets/Drive (requerido)
      # - key: GOOGLE_SHEET_URL
      #   sync: false


